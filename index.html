            });
        }

        function getBorderColor(key) {
            const colors = {
                s3_1: "border-sky-500", s3_2: "border-indigo-500", s3_3: "border-purple-500",
                s3_4: "border-rose-500", s3_5: "border-orange-500", s3_6: "border-yellow-500",
                s3_7: "border-emerald-500", s3_8: "border-teal-500", s3_9: "border-blue-400"
            };
            return colors[key] || "border-slate-500";
        }

        function showPage(id) {
            pages.forEach(p => {
                const el = document.getElementById(p);
                if (p === id) {
                    el.classList.remove('hidden-page');
                    el.style.display = 'block';
                    setTimeout(() => el.style.opacity = '1', 50);
                } else {
                    el.style.opacity = '0';
                    setTimeout(() => el.style.display = 'none', 600);
                }
            });
            const btn = document.getElementById('back-home-btn');
            if (id === 'content-page') {
                btn.classList.remove('hidden');
                btn.style.opacity = '1';
                btn.style.transform = 'translateY(0)';
            } else {
                btn.style.opacity = '0';
                btn.style.transform = 'translateY(50px)';
                setTimeout(() => btn.classList.add('hidden'), 300);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function showSection(key) {
            const data = sectionData[key];
            const body = document.getElementById('section-body');
            
            let imagesHtml = data.images.map(img => `
                <div class="mb-16">
                    <div class="img-container">
                        <img src="${img.url}" alt="地震學相關圖表">
                    </div>
                    <div class="mt-4 p-8 glass-card rounded-[2rem] border-l-4 border-sky-500">
                        <h5 class="text-sky-400 font-bold mb-4 flex items-center">
                            <span class="key-badge">照片深度敘述</span>
                        </h5>
                        <p class="text-slate-300 text-lg leading-relaxed">${img.desc}</p>
                    </div>
                </div>
            `).join('');

            let formulasHtml = data.formulas.length > 0 ? `
                <div class="mt-16 mb-12">
                    <h4 class="text-3xl font-bold text-sky-400 mb-8 flex items-center">
                        <span class="mr-3">∑</span> 物理公式與參數定義
                    </h4>
                    ${data.formulas.map(f => `
                        <div class="formula-box">
                            <div class="math-block text-2xl">$$${f.latex}$$</div>
                            <div class="mt-6">
                                <p class="text-white font-bold mb-4 text-xl">公式定義：${f.define}</p>
                                <ul class="space-y-3 text-slate-400">
                                    ${f.symbols.map(s => `<li class="flex items-start"><span class="text-sky-500 mr-2">•</span><span>${s}</span></li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            let pointListHtml = `
                <div class="summary-box">
                    <h4 class="text-2xl font-bold text-green-400 mb-6 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mr-3" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 9-4.477 9-10S17.523 2 12 2 3 6.477 3 12s3.477 10 9 10z"/><path d="m9 12 2 2 4-4"/></svg>
                        本節重點總結 (Section Summary)
                    </h4>
                    <ul class="space-y-4 pl-6 border-l-2 border-green-500/30">
                        ${data.point_list.map(p => `<li class="text-slate-200 text-lg italic leading-relaxed">${p}</li>`).join('')}
                    </ul>
                </div>
            `;

            body.innerHTML = `
                <div class="mb-16">
                    <button onclick="showPage('menu-page')" class="text-sky-400 hover:text-white flex items-center mb-8 group bg-slate-900/50 px-5 py-2 rounded-xl border border-white/5 transition-all">
                        <span class="mr-2 transform group-hover:-translate-x-1 transition-transform">←</span> 返回章節目錄
                    </button>
                    <h1 class="text-6xl font-bold heading-font text-white drop-shadow-xl mb-10">${data.title}</h1>
                    
                    <div class="glass-card p-10 rounded-[3rem] mb-12 bg-sky-950/20 border-sky-900/30">
                        <p class="text-2xl leading-relaxed text-slate-200 font-light">${data.summary}</p>
                    </div>

                    <div class="space-y-20">
                        ${imagesHtml}
                    </div>

                    ${formulasHtml}
                    ${pointListHtml}
                </div>
            `;
            
            showPage('content-page');
            
            // 觸發 KaTeX 渲染
            if (window.renderMathInElement) {
                renderMathInElement(body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError : false
                });
            }
            // 初始化 3.2 的司乃爾模擬器
            if (key === 's3_2') setTimeout(initSnell, 100);
        }

        function initSnell() {
            const canvas = document.getElementById('snellCanvas');
            const input = document.getElementById('s-angle');
            if (!canvas || !input) return;
            const ctx = canvas.getContext('2d');
            const draw = () => {
                const angle = input.value;
                const valDisp = document.getElementById('s-val');
                if(valDisp) valDisp.innerText = angle;
                const rad = angle * Math.PI / 180;
                const v1 = 5, v2 = 8;
                const sinOut = (v2 * Math.sin(rad)) / v1;
                const outRad = Math.asin(sinOut);
                ctx.clearRect(0, 0, 240, 150);
                ctx.strokeStyle = '#334155'; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(0, 75); ctx.lineTo(240, 75); ctx.stroke();
                ctx.setLineDash([]);
                ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 3; ctx.shadowBlur = 10; ctx.shadowColor = '#0ea5e9';
                ctx.beginPath(); ctx.moveTo(120 - Math.tan(rad)*75, 0); ctx.lineTo(120, 75); ctx.stroke();
                ctx.strokeStyle = '#fb7185'; ctx.shadowColor = '#fb7185';
                if (!isNaN(outRad)) {
                    ctx.beginPath(); ctx.moveTo(120, 75); ctx.lineTo(120 + Math.tan(outRad)*75, 150); ctx.stroke();
                } else {
                    ctx.fillStyle = '#fb7185'; ctx.font = 'bold 10px Arial'; ctx.fillText('CRITICAL / TOTAL REFLECTION', 40, 60);
                    ctx.beginPath(); ctx.moveTo(120, 75); ctx.lineTo(120 + Math.tan(rad)*75, 0); ctx.stroke();
                }
                ctx.shadowBlur = 0;
            };
            input.oninput = draw;
            draw();
        }

        function animateWave() {
            const path = document.getElementById('dynamicWave');
            if(!path) return;
            let time = 0;
            function loop() {
                time += 0.02;
                let d = "M0,100 ";
                for (let x = 0; x <= 1000; x += 10) {
                    const y = 100 + Math.sin(x * 0.01 + time) * 20 + Math.sin(x * 0.05 - time * 2) * 10 * Math.exp(-Math.abs(500-x)/200);
                    d += `L${x},${y} `;
                }
                path.setAttribute('d', d);
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = () => {
            renderMenu();
            const hero = document.getElementById('hero-page');
            if(hero) hero.style.opacity = '1';
            animateWave();
        };
    </script>
</body>
