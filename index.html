    <script>
        const pages = ['hero-page', 'menu-page', 'content-page'];
        const sectionDataScript = document.getElementById('section-data');
        const sectionData = JSON.parse(sectionDataScript.textContent);

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = "";
            Object.keys(sectionData).forEach(key => {
                const item = sectionData[key];
                const card = document.createElement('div');
                card.onclick = () => showSection(key);
                card.className = `menu-card glass-card p-10 rounded-[2rem] border-t-2 ${getBorderColor(key)}`;
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-6 font-bold bg-slate-800 text-sky-400">
                        ${key.replace('s3_', '3.')}
                    </div>
                    <h3 class="text-2xl font-bold text-white mb-3">${item.title.split(':')[0].split('(')[0]}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed line-clamp-3">${item.summary}</p>
                `;
                grid.appendChild(card);
            });
        }

        function getBorderColor(key) {
            const colors = {
                s3_1: "border-sky-500", s3_2: "border-indigo-500", s3_3: "border-purple-500",
                s3_4: "border-rose-500", s3_5: "border-orange-500", s3_6: "border-yellow-500",
                s3_7: "border-emerald-500", s3_8: "border-teal-500", s3_9: "border-blue-400"
            };
            return colors[key] || "border-slate-500";
        }

        function showPage(id) {
            pages.forEach(p => {
                const el = document.getElementById(p);
                if (p === id) {
                    el.classList.remove('hidden-page');
                    el.style.display = 'block';
                    setTimeout(() => el.style.opacity = '1', 50);
                } else {
                    el.style.opacity = '0';
                    setTimeout(() => el.style.display = 'none', 600);
                }
            });
            const btn = document.getElementById('back-home-btn');
            if (id === 'content-page') {
                btn.classList.remove('hidden');
                btn.style.opacity = '1';
                btn.style.transform = 'translateY(0)';
            } else {
                btn.style.opacity = '0';
                btn.style.transform = 'translateY(50px)';
                setTimeout(() => btn.classList.add('hidden'), 300);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function normalizeLatex(str) {
            return str.replace(/\\\\/g, '\\');
        }

        function showSection(key) {
            const data = sectionData[key];
            const body = document.getElementById('section-body');
            
            let imagesHtml = (data.images || []).map(img => `
                <div class="mb-16">
                    <div class="img-container">
                        <img src="${img.url}" alt="Figure">
                    </div>
                    <div class="mt-4 p-8 glass-card rounded-[2rem] border-l-4 border-sky-500 shadow-xl max-w-4xl mx-auto">
                        <h5 class="text-sky-400 font-bold mb-4 flex items-center">
                            <span class="key-badge">照片深度解析 (約 200 字)</span>
                        </h5>
                        <p class="text-slate-300 text-lg leading-relaxed desc-text">${img.desc}</p>
                    </div>
                </div>
            `).join('');

            let corePointsHtml = `
                <div class="mt-12 max-w-4xl mx-auto">
                    <h4 class="text-3xl font-bold text-sky-400 mb-8 flex items-center">
                        <span class="mr-3">📌</span> 本節核心重點整理
                    </h4>
                    ${data.core_points.map(pt => `<div class="point-item text-slate-100 text-xl">${pt}</div>`).join('')}
                </div>
            `;

            let nomenclatureHtml = data.nomenclature ? `
                <div class="mt-16 mb-12 glass-card p-10 rounded-[2.5rem] border-t-2 border-sky-400 shadow-2xl max-w-4xl mx-auto">
                    <h4 class="text-3xl font-bold text-sky-400 mb-6 flex items-center">震相命名法 (Nomenclature)</h4>
                    <p class="text-slate-300 text-xl leading-relaxed mb-8">${data.nomenclature.text}</p>
                    <table class="w-full text-left text-slate-300 nomenclature-table">
                        <thead><tr class="text-sky-400 border-b border-slate-700"><th>符號</th><th>意義</th></tr></thead>
                        <tbody>${data.nomenclature.table.map(row => `<tr><td class="font-mono font-bold text-white text-2xl w-1/4">${row[0]}</td><td class="text-lg text-slate-400">${row[1]}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            ` : '';

            let formulasHtml = (data.formulas || []).length > 0 ? `
                <div class="mt-20 mb-12 max-w-4xl mx-auto">
                    <h4 class="text-3xl font-bold text-sky-400 mb-8 flex items-center"><span class="mr-3 text-4xl">∑</span> 物理公式與參數定義</h4>
                    ${data.formulas.map(f => `
                        <div class="formula-box bg-slate-900/60 p-8 border-l-4 border-sky-500 shadow-2xl mb-8">
                            <div class="math-block text-2xl mb-8 p-6 bg-black rounded-xl">$$${normalizeLatex(f.latex)}$$</div>
                            <p class="text-white font-bold mb-4 text-xl">物理定義：${f.define}</p>
                            <ul class="space-y-4 text-slate-400">${f.symbols.map(s => `<li class="flex items-start"><span class="text-sky-500 mr-3 text-xl">•</span><span class="text-lg">${s}</span></li>`).join('')}</ul>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            body.innerHTML = `
                <div class="mb-16">
                    <button onclick="showPage('menu-page')" class="text-sky-400 hover:text-white flex items-center mb-8 group bg-slate-900/50 px-6 py-3 rounded-xl border border-white/5 transition-all text-lg font-bold">
                        <span class="mr-3 transform group-hover:-translate-x-2 transition-transform text-2xl">←</span> 返回章節目錄
                    </button>
                    <h1 class="text-6xl font-bold heading-font text-white drop-shadow-2xl mb-10 leading-tight">${data.title}</h1>
                    <div class="glass-card p-10 rounded-[3rem] mb-16 bg-sky-950/20 border-sky-900/30 shadow-2xl max-w-4xl mx-auto">
                        <p class="text-2xl leading-relaxed text-slate-200 font-light italic">${data.summary}</p>
                    </div>
                    ${imagesHtml}
                    ${data.extra_concept ? `<div class="mt-16 mb-12 glass-card p-10 rounded-[2.5rem] border-t-2 border-rose-400 shadow-2xl max-w-4xl mx-auto"><h4 class="text-3xl font-bold text-rose-400 mb-6 flex items-center"><svg xmlns='http://www.w3.org/2000/svg' class='mr-4' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z'/><circle cx='12' cy='12' r='3'/></svg>${data.extra_concept.title}</h4><p class="text-slate-300 text-xl leading-relaxed desc-text italic">${data.extra_concept.content}</p></div>` : ''}
                    ${corePointsHtml}
                    ${nomenclatureHtml}
                    ${formulasHtml}
                    <div class="summary-box bg-green-950/20 border-green-500/30 p-10 max-w-4xl mx-auto mt-20">
                        <h4 class="text-3xl font-bold text-green-400 mb-8 flex items-center">本節內容總結</h4>
                        <p class="text-slate-100 text-xl italic leading-relaxed">${data.summary}</p>
                    </div>
                </div>
            `;
            
            showPage('content-page');
            
            if (window.renderMathInElement) {
                renderMathInElement(body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError : false
                });
            }
            if (key === 's3_2') setTimeout(initSnell, 100);
        }

        function animateWave() {
            const path = document.getElementById('dynamicWave');
            if(!path) return;
            let time = 0;
            function loop() {
                time += 0.02;
                let d = "M0,100 ";
                for (let x = 0; x <= 1000; x += 10) {
                    const y = 100 + Math.sin(x * 0.01 + time) * 20 + Math.sin(x * 0.05 - time * 2) * 10 * Math.exp(-Math.abs(500-x)/200);
                    d += `L${x},${y} `;
                }
                path.setAttribute('d', d);
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = () => {
            renderMenu();
            const hero = document.getElementById('hero-page');
            if(hero) hero.style.opacity = '1';
            animateWave();
        };
    </script>
</body>
</html>
