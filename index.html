                    "symbols": [
                        "$\\\\rho$：密度隨半徑 $r$ 的變化率。",
                        "$G$：萬有引力常數。",
                        "$m(r)$：半徑 $r$ 以內累積的地球質量總和。",
                        "$\\\\Phi$：地震參數 (Seismic parameter)，由 P 波速度 $\\\\alpha$ 與 S 波速度 $\\\\beta$ 計算得知：$\\\\Phi = \\\\alpha^2 - \\\\frac{4}{3}\\\\beta^2$。"
                    ]
                }
            ],
            "point_list": ["地函主要由富鎂的矽酸鹽（如橄欖岩）組成。", "410km 與 660km 的波速跳躍源於橄欖石的高壓相變。", "地核為金屬組成，且外核含輕元素以降低密度。"]
        },
        "s3_9": {
            "title": "3.9 Antigravity: 紀錄剖面圖實例分析",
            "summary": "展示 2024/04/03 花蓮地震實例紀錄，解析台灣地殼波傳特性。",
            "images": [
                {
                    "url": "https://raw.githubusercontent.com/JinJia0618/Seismology-CH.3/main/record_section.png",
                    "desc": "這張紀錄剖面圖 (Record Section) 直觀展示了 2024 年 4 月 3 日花蓮強震後的波傳過程。透過 Taiwan GDMS 系統，我們可以觀察到 P 波與 S 波隨震央距離遞增的走時特徵。圖中明顯的震相連續性，對於校正台灣複雜的地殼速度模型具有極高的學術研究價值。此份資料不僅是災難紀錄，更是優化預警系統、強化國家韌性設計不可或缺的觀測依據。"
                }
            ],
            "formulas": [],
            "point_list": ["2024/04/03 花蓮地震規模 7.2，展示了顯著的近場與遠場波傳效應。", "Record Section 是分析地震能量隨距離衰減與路徑不均質性的核心工具。", "資料取自 Taiwan GDMS，體現了台灣高密度測站對於解構強震破裂過程的高解析優勢。"]
        }
    }
    </script>

    <script>
        const pages = ['hero-page', 'menu-page', 'content-page'];
        const sectionDataScript = document.getElementById('section-data');
        const sectionData = JSON.parse(sectionDataScript.textContent);

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = "";
            Object.keys(sectionData).forEach(key => {
                const item = sectionData[key];
                const card = document.createElement('div');
                card.onclick = () => showSection(key);
                card.className = `menu-card glass-card p-10 rounded-[2rem] border-t-2 ${getBorderColor(key)}`;
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center mb-6 font-bold bg-slate-800 text-sky-400">
                        ${key.replace('s3_', '3.')}
                    </div>
                    <h3 class="text-2xl font-bold text-white mb-3">${item.title.split(':')[0].split('(')[0]}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed line-clamp-3">${item.summary}</p>
                `;
                grid.appendChild(card);
            });
        }

        function getBorderColor(key) {
            const colors = {
                s3_1: "border-sky-500", s3_2: "border-indigo-500", s3_3: "border-purple-500",
                s3_4: "border-rose-500", s3_5: "border-orange-500", s3_6: "border-yellow-500",
                s3_7: "border-emerald-500", s3_8: "border-teal-500", s3_9: "border-blue-400"
            };
            return colors[key] || "border-slate-500";
        }

        function showPage(id) {
            pages.forEach(p => {
                const el = document.getElementById(p);
                if (p === id) {
                    el.classList.remove('hidden-page');
                    el.style.display = 'block';
                    setTimeout(() => el.style.opacity = '1', 50);
                } else {
                    el.style.opacity = '0';
                    setTimeout(() => el.style.display = 'none', 600);
                }
            });
            const btn = document.getElementById('back-home-btn');
            if (id === 'content-page') {
                btn.classList.remove('hidden');
                btn.style.opacity = '1';
                btn.style.transform = 'translateY(0)';
            } else {
                btn.style.opacity = '0';
                btn.style.transform = 'translateY(50px)';
                setTimeout(() => btn.classList.add('hidden'), 300);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function normalizeLatex(str) {
            return str.replace(/\\\\/g, '\\');
        }

        function showSection(key) {
            const data = sectionData[key];
            const body = document.getElementById('section-body');
            
            let imagesHtml = data.images.map(img => `
                <div class="mb-16">
                    <div class="img-container">
                        <img src="${img.url}" alt="Seismology Figure">
                    </div>
                    <div class="mt-4 p-8 glass-card rounded-[2rem] border-l-4 border-sky-500 shadow-xl">
                        <h5 class="text-sky-400 font-bold mb-4 flex items-center">
                            <span class="key-badge">照片深度解析 (約 200 字)</span>
                        </h5>
                        <p class="text-slate-300 text-lg leading-relaxed desc-text">${img.desc}</p>
                    </div>
                </div>
            `).join('');

            let extraConceptHtml = data.extra_concept ? `
                 <div class="mt-16 mb-12 glass-card p-10 rounded-[2.5rem] border-t-2 border-rose-400 shadow-2xl">
                    <h4 class="text-3xl font-bold text-rose-400 mb-6 flex items-center">
                         <svg xmlns="http://www.w3.org/2000/svg" class="mr-4" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
                        ${data.extra_concept.title}
                    </h4>
                    <p class="text-slate-300 text-xl leading-relaxed desc-text italic">
                        ${data.extra_concept.content}
                    </p>
                </div>
            ` : '';

            let nomenclatureHtml = data.nomenclature ? `
                <div class="mt-16 mb-12 glass-card p-10 rounded-[2.5rem] border-t-2 border-sky-400 shadow-2xl">
                    <h4 class="text-3xl font-bold text-sky-400 mb-6 flex items-center">
                         <svg xmlns="http://www.w3.org/2000/svg" class="mr-4" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        地震波震相命名法 (Nomenclature)
                    </h4>
                    <div class="text-slate-300 text-xl leading-relaxed mb-10">
                        ${data.nomenclature.text}
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-slate-300 nomenclature-table">
                            <thead>
                                <tr class="text-sky-400 border-b border-slate-700">
                                    <th class="font-bold text-xl">符號 (Symbol)</th>
                                    <th class="font-bold text-xl">物理定義與意義</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.nomenclature.table.map(row => `
                                    <tr>
                                        <td class="font-mono font-bold text-white text-2xl w-1/4">${row[0]}</td>
                                        <td class="text-lg text-slate-400">${row[1]}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            ` : '';

            let formulasHtml = data.formulas && data.formulas.length > 0 ? `
                <div class="mt-20 mb-12">
                    <h4 class="text-3xl font-bold text-sky-400 mb-8 flex items-center">
                        <span class="mr-3 text-4xl">∑</span> 物理公式與參數定義
                    </h4>
                    ${data.formulas.map(f => `
                        <div class="formula-box bg-slate-900/60 p-8 border-l-4 border-sky-500 shadow-2xl">
                            <div class="math-block text-2xl mb-8 p-6 bg-black rounded-xl">$$ ${normalizeLatex(f.latex)} $$</div>
                            <div class="mt-6 border-t border-slate-700/50 pt-6">
                                <p class="text-white font-bold mb-4 text-xl">物理定義：${f.define}</p>
                                <ul class="space-y-4 text-slate-400">
                                    ${f.symbols.map(s => `<li class="flex items-start"><span class="text-sky-500 mr-3 text-xl">•</span><span class="text-lg">${s}</span></li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            let pointListHtml = data.point_list && data.point_list.length > 0 ? `
                <div class="summary-box bg-green-950/20 border-green-500/30 p-10">
                    <h4 class="text-3xl font-bold text-green-400 mb-8 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mr-4" width="36" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 9-4.477 9-10S17.523 2 12 2 3 6.477 3 12s3.477 10 9 10z"/><path d="m9 12 2 2 4-4"/></svg>
                        本節核心重點總結 (Section Summary)
                    </h4>
                    <ul class="space-y-5 pl-6 border-l-4 border-green-500/40">
                        ${data.point_list.map(p => `<li class="text-slate-100 text-xl italic leading-relaxed tracking-wide">${p}</li>`).join('')}
                    </ul>
                </div>
            ` : '';

            body.innerHTML = `
                <div class="mb-16">
                    <button onclick="showPage('menu-page')" class="text-sky-400 hover:text-white flex items-center mb-8 group bg-slate-900/50 px-6 py-3 rounded-xl border border-white/5 transition-all text-lg font-bold">
                        <span class="mr-3 transform group-hover:-translate-x-2 transition-transform text-2xl">←</span> 返回章節目錄
                    </button>
                    <h1 class="text-6xl font-bold heading-font text-white drop-shadow-2xl mb-10 leading-tight">${data.title}</h1>
                    
                    <div class="glass-card p-10 rounded-[3rem] mb-16 bg-sky-950/20 border-sky-900/30 shadow-2xl">
                        <p class="text-2xl leading-relaxed text-slate-200 font-light italic">${data.summary}</p>
                    </div>

                    <div class="space-y-24">
                        ${imagesHtml}
                    </div>

                    ${extraConceptHtml}
                    ${nomenclatureHtml}
                    ${formulasHtml}
                    ${pointListHtml}
                </div>
            `;
            
            showPage('content-page');
            
            if (window.renderMathInElement) {
                renderMathInElement(body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError : false
                });
            }
            if (key === 's3_2') setTimeout(initSnell, 100);
        }

        function initSnell() {
            const canvas = document.getElementById('snellCanvas');
            const input = document.getElementById('s-angle');
            if (!canvas || !input) return;
            const ctx = canvas.getContext('2d');
            const draw = () => {
                const angle = input.value;
                const valDisp = document.getElementById('s-val');
                if(valDisp) valDisp.innerText = angle;
                const rad = angle * Math.PI / 180;
                const v1 = 5, v2 = 8;
                const sinOut = (v2 * Math.sin(rad)) / v1;
                const outRad = Math.asin(sinOut);

                ctx.clearRect(0, 0, 240, 150);
                ctx.strokeStyle = '#334155'; ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(0, 75); ctx.lineTo(240, 75); ctx.stroke();
                ctx.setLineDash([]);
                ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 3; ctx.shadowBlur = 10; ctx.shadowColor = '#0ea5e9';
                ctx.beginPath(); ctx.moveTo(120 - Math.tan(rad)*75, 0); ctx.lineTo(120, 75); ctx.stroke();
                ctx.strokeStyle = '#fb7185'; ctx.shadowColor = '#fb7185';
                if (!isNaN(outRad)) {
                    ctx.beginPath(); ctx.moveTo(120, 75); ctx.lineTo(120 + Math.tan(outRad)*75, 150); ctx.stroke();
                } else {
                    ctx.fillStyle = '#fb7185'; ctx.font = 'bold 10px Arial'; ctx.fillText('CRITICAL / TOTAL REFLECTION', 40, 60);
                    ctx.beginPath(); ctx.moveTo(120, 75); ctx.lineTo(120 + Math.tan(rad)*75, 0); ctx.stroke();
                }
                ctx.shadowBlur = 0;
            };
            input.oninput = draw;
            draw();
        }

        function animateWave() {
            const path = document.getElementById('dynamicWave');
            if(!path) return;
            let time = 0;
            function loop() {
                time += 0.02;
                let d = "M0,100 ";
                for (let x = 0; x <= 1000; x += 10) {
                    const y = 100 + Math.sin(x * 0.01 + time) * 20 + Math.sin(x * 0.05 - time * 2) * 10 * Math.exp(-Math.abs(500-x)/200);
                    d += `L${x},${y} `;
                }
                path.setAttribute('d', d);
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = () => {
            renderMenu();
            const hero = document.getElementById('hero-page');
            if(hero) hero.style.opacity = '1';
            animateWave();
        };
    </script>
</body>
</html>
